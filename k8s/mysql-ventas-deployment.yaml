apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql-ventas
  namespace: innovatech-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql-ventas
  template:
    metadata:
      labels:
        app: mysql-ventas
    spec:
      containers:
        - name: mysql-ventas
          image: mysql:8.0
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ventas-secret
                  key: DB_PASSWORD
            - name: MYSQL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: ventas-secret
                  key: DB_NAME
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: ventas-secret
                  key: DB_USERNAME
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ventas-secret
                  key: DB_PASSWORD
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: mysql-ventas-storage
              mountPath: /var/lib/mysql
      volumes:
        - name: mysql-ventas-storage
          emptyDir: {}
