apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-despacho
  namespace: innovatech-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend-despacho
  template:
    metadata:
      labels:
        app: backend-despacho
    spec:
      imagePullSecrets:
        - name: ecr-secret
      containers:
        - name: backend-despacho
          image: 128806834448.dkr.ecr.us-east-1.amazonaws.com/backend-despacho:eks-v1
          ports:
            - containerPort: 8081
          env:
            - name: DB_ENDPOINT
              value: "172.17.0.1"
            - name: DB_PORT
              value: "3306"
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: despacho-secret
                  key: DB_NAME
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: despacho-secret
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: despacho-secret
                  key: DB_PASSWORD
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
