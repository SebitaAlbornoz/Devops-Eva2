version: '3.8'

services:
  # Microservicio de Ventas
  back-ventas:
    build: ./back-Ventas_SpringBoot/Springboot-API-REST
    container_name: ms_ventas
    ports:
      - "8080:8080"

  # Microservicio de Despachos
  back-despachos:
    build: ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
    container_name: ms_despachos
    ports:
      - "8081:8080" # Usamos el 8081 externo para que no choque con Ventas

  # Frontend en React
  front-despacho:
    build: ./front_despacho
    container_name: frontend_tienda
    ports:
      - "80:80"
    depends_on:
      - back-ventas
      - back-despachos

volumes:
  # Volumen definido para la persistencia requerida por la pauta
  tienda_data: