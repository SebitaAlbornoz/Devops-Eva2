name: CI/CD innovatech app - Backend


on:
  push:
    branches: [ "main" ]
    paths:
      - "back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO**"

jobs:
  build-push-deploy-backend:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout código
      uses: actions/checkout@v3

    - name: Configurar credenciales AWS (Para el Runner)
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Login en Amazon ECR (runner)
      uses: aws-actions/amazon-ecr-login@v1

    - name: Build imagen Backend y push a ECR
      env:
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY_URL }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPO_URL_BACKEND }}
          IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

    - name: Desplegar Backend en Subred Privada vía Bastión (SSH)
      uses: appleboy/ssh-action@v1.0.3
      with:

        # --- DESTINO FINAL: INSTANCIA DE LA APP / BACKEND ---

        host: "10.0.2.124"                        # Tu IP privada fija del Backend
        username: ec2-user
        key: ${{ secrets.EC2_SSH_KEY }}
        port: 22

        # --- EL PUENTE (BASTIÓN): INSTANCIA DEL FRONTEND PÚBLICO ---

        proxy_host: ${{ secrets.EC2_PUBLIC_IP }}     # IP Pública de tu Frontend
        proxy_username: ec2-user
        proxy_key: ${{ secrets.EC2_SSH_KEY }}
        proxy_port: 22

        script: |
          aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | \
              docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY_URL }}
            docker stop back-despachos || true
            docker rm back-despachos || true
            docker pull ${{ secrets.ECR_REGISTRY_URL }}/${{ secrets.ECR_REPO_URL_BACKEND }}:latest
            docker run -d \
              --name back-despachos \
              --restart unless-stopped \
              --network host \
              -e DB_ENDPOINT=localhost \
              -e DB_PORT=3306 \
              -e DB_NAME=${{ secrets.DB_NAME }} \
              -e DB_USERNAME=${{ secrets.DB_USERNAME }} \
              -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
              -e MYSQL_ROOT_PASSWORD=rootpass123 \
              -v dbdata:/var/lib/mysql \
              ${{ secrets.ECR_REGISTRY_URL }}/${{ secrets.ECR_REPO_URL_BACKEND }}:latest
          docker image prune -f