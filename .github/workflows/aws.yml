name: CI/CD innovatech app - Frontend AWS

on:
  push:
    branches: [ "main" ]
    paths:
      - "front_despacho/**"

jobs:
  build-push-deploy-frontend:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout código
      uses: actions/checkout@v3

    # Reemplaza todo el Login de AWS por el Login limpio de Docker Hub
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # Construye y sube directo a Docker Hub de forma gratuita
    - name: Build imagen Frontend y push a Docker Hub
      run: |
        cd front_despacho
        docker build -t ${{ secrets.DOCKER_USERNAME }}/frontend-despacho:latest .
        docker push ${{ secrets.DOCKER_USERNAME }}/frontend-despacho:latest

    - name: Desplegar Frontend vía SSH directo
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_PUBLIC_IP }}
        username: ec2-user
        key: ${{ secrets.EC2_SSH_KEY }}
        port: 22
        script: |
          set -e
          
          # 1. Loguearse en la EC2 a Docker Hub para bajar la imagen
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login --username "${{ secrets.DOCKER_USERNAME }}" --password-stdin

          # 2. Descargar la imagen limpia de Docker Hub
          docker pull ${{ secrets.DOCKER_USERNAME }}/frontend-despacho:latest

          # 3. Refrescar el contenedor en la EC2
          docker stop frontend-despacho || true
          docker rm frontend-despacho || true
          docker run -d --name frontend-despacho -p 80:80 ${{ secrets.DOCKER_USERNAME }}/frontend-despacho:latest

          # 4. Limpieza de espacio en disco
          docker image prune -f